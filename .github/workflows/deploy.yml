name: Deploy Bible Reader to GitHub Pages

"on":
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Show repository structure
        shell: bash
        run: |
          echo "Repository root: $GITHUB_WORKSPACE"
          pwd
          find . -maxdepth 2 -type f | sort | sed -n '1,160p'

      - name: Install dependencies
        run: npm ci

      - name: Validate source before build
        shell: bash
        run: |
          test -f index.html
          test -f src/main.jsx
          test -f src/services/bibleData.js
          test -f public/bible/manifest.json
          test -f public/bible/GEN/1.json

          IMPORT_COUNT=$(grep -c "services/bibleData" src/main.jsx || true)
          if [ "$IMPORT_COUNT" -ne 1 ]; then
            echo "Expected exactly one bibleData import; found $IMPORT_COUNT"
            exit 1
          fi

          if grep -RInE '^(<<<<<<< |=======|>>>>>>> )' src vite.config.js package.json; then
            echo "Unresolved Git merge conflict markers found"
            exit 1
          fi

      - name: Build static Bible Reader
        env:
          VITE_STATIC_BIBLE: "true"
          VITE_BASE_PATH: "/"
        run: npx vite build --outDir dist --emptyOutDir

      - name: Verify generated website
        shell: bash
        run: |
          echo "Build output:"
          find dist -maxdepth 3 -type f | sort | sed -n '1,160p'

          test -d dist
          test -f dist/index.html
          test -f dist/bible/manifest.json
          test -f dist/bible/GEN/1.json

          if grep -q '/src/main.jsx' dist/index.html; then
            echo "Error: dist/index.html still points to source main.jsx"
            exit 1
          fi

          if ! grep -q 'assets/' dist/index.html; then
            echo "Error: compiled asset reference is missing from dist/index.html"
            exit 1
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4