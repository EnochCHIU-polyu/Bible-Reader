name: Deploy Bible Reader

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build static Bible Reader
        env:
          VITE_STATIC_BIBLE: "true"
          VITE_BASE_PATH: "/"
        run: npm run build
      - name: Verify production artifact
        run: |
          test -f dist/index.html
          test -f dist/bible/manifest.json
          test -f dist/bible/GEN/1.json
          ! grep -q '/src/main.jsx' dist/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
