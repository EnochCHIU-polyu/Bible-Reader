name: Deploy Bible Reader to GitHub Pages

"on":
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static Bible Reader
        env:
          VITE_STATIC_BIBLE: "true"
          VITE_BASE_PATH: "/"
        run: npm run build

      - name: Verify generated website
        shell: bash
        run: |
          test -f dist/index.html
          test -f dist/bible/manifest.json
          test -f dist/bible/GEN/1.json
          if grep -q '/src/main.jsx' dist/index.html; then
            echo "Error: dist/index.html still references source main.jsx"
            exit 1
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4