name: Deploy Bible Reader to GitHub Pages

"on":
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Find project folder
        id: project
        shell: bash
        run: |
          PROJECT_DIR=""

          if [ -f package.json ] && [ -f src/main.jsx ]; then
            PROJECT_DIR="."
          else
            while IFS= read -r FILE; do
              DIR="$(dirname "$FILE")"
              if [ -f "$DIR/package.json" ]; then
                PROJECT_DIR="$DIR"
                break
              fi
            done < <(find . -type f -path '*/src/main.jsx' -not -path '*/node_modules/*' | sort)
          fi

          if [ -z "$PROJECT_DIR" ]; then
            echo "No project containing package.json and src/main.jsx was found."
            find . -maxdepth 5 -type f -not -path '*/.git/*' | sort | head -300
            exit 1
          fi

          PROJECT_DIR="${PROJECT_DIR#./}"
          [ -n "$PROJECT_DIR" ] || PROJECT_DIR="."
          echo "Project folder: $PROJECT_DIR"
          echo "dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Create missing Vite entry file
        working-directory: ${{ steps.project.outputs.dir }}
        shell: bash
        run: |
          if [ ! -f index.html ]; then
            cat > index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <meta name="theme-color" content="#181c17" />
              <title>Parallel Bible</title>
            </head>
            <body>
              <div id="root"></div>
              <script type="module" src="/src/main.jsx"></script>
            </body>
          </html>
          HTML
          fi
          test -f index.html

      - name: Install dependencies
        working-directory: ${{ steps.project.outputs.dir }}
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Validate application files
        working-directory: ${{ steps.project.outputs.dir }}
        shell: bash
        run: |
          test -f src/main.jsx
          test -f src/services/bibleData.js
          test -f public/bible/manifest.json
          test -f public/bible/GEN/1.json

          COUNT=$(grep -c "services/bibleData" src/main.jsx || true)
          if [ "$COUNT" -ne 1 ]; then
            echo "Expected one bibleData import, found $COUNT"
            exit 1
          fi

          if grep -RInE '^(<<<<<<< |=======|>>>>>>> )' src package.json vite.config.js 2>/dev/null; then
            echo "Unresolved merge markers found"
            exit 1
          fi

      - name: Build website
        working-directory: ${{ steps.project.outputs.dir }}
        env:
          VITE_STATIC_BIBLE: "true"
          VITE_BASE_PATH: "/"
        run: npx vite build --outDir dist --emptyOutDir

      - name: Verify build
        working-directory: ${{ steps.project.outputs.dir }}
        shell: bash
        run: |
          find dist -maxdepth 3 -type f | sort | head -200
          test -f dist/index.html
          test -f dist/bible/manifest.json
          test -f dist/bible/GEN/1.json
          grep -q 'assets/' dist/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.project.outputs.dir }}/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4